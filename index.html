<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload PDF</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            padding: 20px;
        }

        form {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
        }

        input[type="file"] {
            display: block;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 15px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #218838;
        }

        .message {
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1>Upload PDF Document</h1>
    
    <form id="pdfUploadForm" enctype="multipart/form-data">
        <label for="pdfFile">Choose a PDF document to upload:</label>
        <input type="file" id="pdfFile" name="pdfFile" accept="application/pdf" required>
        <button type="submit">Upload PDF</button>
    </form>

    <div class="message" id="responseMessage"></div>

    <script>
        document.getElementById('pdfUploadForm').addEventListener('submit', function(event) {
            event.preventDefault();  // Prevent the default form submission

            const formData = new FormData();
            const pdfFile = document.getElementById('pdfFile').files[0];

            if (!pdfFile) {
                alert('Please select a PDF file to upload.');
                return;
            }

            formData.append('pdfFile', pdfFile);

            fetch('http://localhost:8080/upload-pdf', {  // Replace with your Java backend URL
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('responseMessage').innerHTML = `<p>${data.message}</p>`;
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('responseMessage').innerHTML = '<p>An error occurred while uploading the file.</p>';
            });
        });
    </script>

</body>
</html>
